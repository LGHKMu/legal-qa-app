# legal-qa-app Docker Compose（安全默认：后端不对外暴露，问答需 APP_API_KEY）
# 详见 docs/SECURITY.md、docs/DEPLOY.md

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal-qa-backend
    env_file:
      - ./backend/.env
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8001
      INFERENCE_DEVICE: ${INFERENCE_DEVICE:-cpu}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      SECURITY_REQUIRE_API_KEY: ${SECURITY_REQUIRE_API_KEY:-true}
      APP_API_KEY: ${APP_API_KEY:-}
      RATE_LIMIT_ASK_PER_MINUTE: ${RATE_LIMIT_ASK_PER_MINUTE:-20}
      SECURITY_SANITIZE_ERRORS: ${SECURITY_SANITIZE_ERRORS:-true}
      SECURITY_TRUST_PROXY_HEADERS: ${SECURITY_TRUST_PROXY_HEADERS:-true}
    volumes:
      - ./backend/data/chroma:/app/data/chroma
      - ./backend/data/bm25:/app/data/bm25
      - ./backend/data/models:/app/data/models
      - ./backend/data/traces:/app/data/traces
    expose:
      - "8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-qa-frontend
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      BACKEND_API_KEY: ${APP_API_KEY:-}
      NGINX_BASIC_AUTH: ${NGINX_BASIC_AUTH:-off}
    # 启用 Basic Auth 时：NGINX_BASIC_AUTH=on 并取消下一行注释
    # volumes:
    #   - ./deploy/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
