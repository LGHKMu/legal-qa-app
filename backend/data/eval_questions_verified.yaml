# 可核验来源评测集（替代 AI 生成标注）
#
# 设计原则：
# 1. 每题附 source_url，出处为全国人大/最高法/最高检/权威法院公开文书或官方法条页
# 2. expected_articles 已对照本系统知识库（四部法律）逐条校验
# 3. 案情题仅选用已公开裁判/指导案例，法条依据以司法机关认定为准
# 4. 案情题提问：只写事实与争议，结尾用中性问法（如「应适用哪条法律规定？」），
#    不在题干中出现法律名称、罪名、制度术语等检索提示；law_id 仅用于评测标注与联合匹配
#
# 校验：python scripts/verify_eval_dataset.py --file data/eval_questions_verified.yaml
# 评测：python scripts/compare_rag.py --eval-file data/eval_questions_verified.yaml --retrieval-only
#
# 题量：68 题（官方法条 + 指导案例/典型案例 + 口语化案情）
version: "1.0"
questions:
