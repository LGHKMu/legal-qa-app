# PR / push 门禁：与本地 run_ci.ps1、run_all_tests.py --ci 对齐
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Actions 页「Run workflow」手动触发

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: unit-tests + frontend-build
    runs-on: ubuntu-latest

    env:
      QUERY_REWRITE_ENABLED: "false"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend unit tests
        working-directory: backend
        run: python -m pytest tests/unit -q -m "not live and not integration"

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

  recall-gate:
    name: recall-gate (Agent ci_no_llm)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      QUERY_REWRITE_ENABLED: "false"
      AGENT_ROUTER_LLM_ENABLED: "false"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error
      RECALL_GATE_PROFILE: ci_no_llm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Recall gate (build index + Agent eval)
        working-directory: backend
        run: python scripts/recall_gate.py --profile ci_no_llm

  recall-gate-full:
    name: recall-gate-full (Agent + LLM, optional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && secrets.DEEPSEEK_API_KEY != ''

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QUERY_REWRITE_ENABLED: "true"
      AGENT_ROUTER_LLM_ENABLED: "true"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Full Agent Recall gate (>= 85%)
        working-directory: backend
        run: python scripts/recall_gate.py --profile ci_full
