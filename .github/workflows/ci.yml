# PR / push 门禁：与本地 run_ci.ps1、run_all_tests.py --ci 对齐
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Actions 页「Run workflow」手动触发
    inputs:
      run_full_recall_gate:
        description: Run full Agent recall gate (requires DEEPSEEK_API_KEY secret)
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: unit-tests + frontend-build
    runs-on: ubuntu-latest

    env:
      QUERY_REWRITE_ENABLED: "false"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend unit tests
        working-directory: backend
        run: python -m pytest tests/unit -q -m "not live and not integration"

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

  recall-gate:
    name: recall-gate (Agent ci_no_llm)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      QUERY_REWRITE_ENABLED: "false"
      AGENT_ROUTER_LLM_ENABLED: "false"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error
      RECALL_GATE_PROFILE: ci_no_llm
      EMBEDDING_MODEL: ./data/models/bge-small-zh-v1.5
      EMBEDDING_LOCAL_ONLY: "true"
      RERANK_MODEL_PATH: ./data/models/bge-reranker-base
      RERANK_LOCAL_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Cache CI models
        uses: actions/cache@v4
        with:
          path: backend/data/models
          key: ci-models-v1-${{ runner.os }}

      - name: Download embedding and reranker models
        working-directory: backend
        run: python scripts/download_ci_models.py

      - name: Recall gate (build index + Agent eval)
        working-directory: backend
        run: python scripts/recall_gate.py --profile ci_no_llm

  recall-gate-full:
    name: recall-gate-full (Agent + LLM, optional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_recall_gate

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QUERY_REWRITE_ENABLED: "true"
      AGENT_ROUTER_LLM_ENABLED: "true"
      INFERENCE_DEVICE: cpu
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TQDM_DISABLE: "1"
      TRANSFORMERS_VERBOSITY: error
      EMBEDDING_MODEL: ./data/models/bge-small-zh-v1.5
      EMBEDDING_LOCAL_ONLY: "true"
      RERANK_MODEL_PATH: ./data/models/bge-reranker-base
      RERANK_LOCAL_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require DEEPSEEK_API_KEY
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::请在仓库 Settings → Secrets 配置 DEEPSEEK_API_KEY"
            exit 1
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Cache CI models
        uses: actions/cache@v4
        with:
          path: backend/data/models
          key: ci-models-v1-${{ runner.os }}

      - name: Download embedding and reranker models
        working-directory: backend
        run: python scripts/download_ci_models.py

      - name: Full Agent Recall gate (>= 85%)
        working-directory: backend
        run: python scripts/recall_gate.py --profile ci_full
